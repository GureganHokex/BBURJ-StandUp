{{define "admin/layout"}}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Админ</title>
  <link rel="icon" href="/static/img/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/tailwind.css">
  <link rel="stylesheet" href="/static/css/admin.css">
  <meta name="csrf-token" content="{{.CSRF}}">
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen flex">
  <aside class="w-56 bg-slate-900 text-slate-100 flex flex-col shrink-0">
    <div class="px-4 py-5 border-b border-slate-700">
      <a href="/admin" class="font-semibold text-lg">Comic Admin</a>
    </div>
    <nav class="flex-1 px-2 py-4 space-y-1 text-sm">
      <a href="/admin" class="block px-3 py-2 rounded {{if eq .Active ""}}bg-slate-800{{else}}hover:bg-slate-800{{end}}">Главная</a>
      <a href="/admin/settings" class="block px-3 py-2 rounded {{if eq .Active "settings"}}bg-slate-800{{else}}hover:bg-slate-800{{end}}">Settings</a>
      <a href="/admin/events" class="block px-3 py-2 rounded {{if eq .Active "events"}}bg-slate-800{{else}}hover:bg-slate-800{{end}}">Events</a>
      <a href="/admin/photos" class="block px-3 py-2 rounded {{if eq .Active "photos"}}bg-slate-800{{else}}hover:bg-slate-800{{end}}">Photos</a>
      <a href="/admin/videos" class="block px-3 py-2 rounded {{if eq .Active "videos"}}bg-slate-800{{else}}hover:bg-slate-800{{end}}">Videos</a>
      <a href="/admin/merch" class="block px-3 py-2 rounded {{if eq .Active "merch"}}bg-slate-800{{else}}hover:bg-slate-800{{end}}">Merch</a>
      <a href="/admin/account" class="block px-3 py-2 rounded {{if eq .Active "account"}}bg-slate-800{{else}}hover:bg-slate-800{{end}}">Пароль</a>
    </nav>
    <form method="post" action="/admin/logout" class="p-4 border-t border-slate-700">
      <input type="hidden" name="csrf_token" value="{{.CSRF}}">
      <button type="submit" class="w-full text-left text-sm text-slate-300 hover:text-white">Выйти</button>
    </form>
  </aside>
  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-slate-200 px-6 py-4">
      <h1 class="text-xl font-semibold">{{.Title}}</h1>
    </header>
    <main class="p-6 flex-1">
      <div id="flash-area"></div>
      {{.ContentHTML}}
    </main>
  </div>
  <script src="/static/js/admin.js"></script>
</body>
</html>
{{end}}
