{{define "admin/account_content"}}
<div class="max-w-md bg-white rounded-lg border border-slate-200 p-6">
  <p class="text-sm text-slate-600 mb-4">После смены пароля все активные сессии будут завершены — потребуется войти снова.</p>
  <div id="form-errors" class="mb-4 hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded p-3"></div>
  <form id="account-form" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Текущий пароль</label>
      <input name="current_password" type="password" required autocomplete="current-password" class="w-full border border-slate-300 rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Новый пароль</label>
      <input name="new_password" type="password" required minlength="12" autocomplete="new-password" class="w-full border border-slate-300 rounded px-3 py-2">
      <p class="text-xs text-slate-500 mt-1">Минимум 12 символов</p>
    </div>
    <button type="submit" class="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded hover:bg-slate-800">Сменить пароль</button>
  </form>
</div>
<script>
  document.body.dataset.pageMode = "account";
</script>
{{end}}
