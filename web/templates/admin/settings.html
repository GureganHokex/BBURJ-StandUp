{{define "admin/settings_content"}}
<div class="max-w-2xl bg-white rounded-lg border border-slate-200 p-6">
  <p class="text-sm text-slate-600 mb-4">Тексты, соцсети и загрузка изображений для публичного сайта.</p>
  <div id="form-errors" class="mb-4 hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded p-3"></div>
  <form id="settings-form" class="space-y-4">
    <fieldset class="border border-slate-200 rounded p-4 space-y-4">
      <legend class="text-sm font-semibold px-1">Hero и портрет</legend>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Фон hero <span class="text-red-600">*</span></label>
        <div class="upload-dropzone" data-target-input="hero_image_url" tabindex="0">
          <div class="upload-dropzone-icon">🖼</div>
          <p class="upload-dropzone-text">Перетащите фото или нажмите</p>
          <p class="upload-dropzone-hint">JPEG, PNG, WebP, GIF</p>
          <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" class="hidden upload-file-input">
        </div>
        <div class="upload-preview-wrap hidden"><img class="upload-preview" alt="hero"></div>
        <div class="upload-error hidden"></div>
        <input name="hero_image_url" type="hidden" class="upload-hidden-url" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Портрет (обо мне) <span class="text-red-600">*</span></label>
        <div class="upload-dropzone" data-target-input="portrait_image_url" tabindex="0">
          <div class="upload-dropzone-icon">📷</div>
          <p class="upload-dropzone-text">Перетащите фото или нажмите</p>
          <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" class="hidden upload-file-input">
        </div>
        <div class="upload-preview-wrap hidden"><img class="upload-preview" alt="portrait"></div>
        <div class="upload-error hidden"></div>
        <input name="portrait_image_url" type="hidden" class="upload-hidden-url" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Подпись hero <span class="text-red-600">*</span></label>
        <input name="hero_tagline" type="text" required class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
    </fieldset>
    <fieldset class="border border-slate-200 rounded p-4 space-y-3">
      <legend class="text-sm font-semibold px-1">Обо мне</legend>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Текст <span class="text-red-600">*</span></label>
        <textarea name="about_text" rows="4" required class="w-full border border-slate-300 rounded px-3 py-2"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Доп. абзац</label>
        <textarea name="about_extra" rows="3" class="w-full border border-slate-300 rounded px-3 py-2"></textarea>
      </div>
    </fieldset>
    <fieldset class="border border-slate-200 rounded p-4 space-y-3">
      <legend class="text-sm font-semibold px-1">Соцсети</legend>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">YouTube URL</label>
          <input name="youtube_url" type="url" class="w-full border border-slate-300 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">YouTube @</label>
          <input name="youtube_handle" type="text" class="w-full border border-slate-300 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Telegram URL</label>
          <input name="telegram_url" type="url" class="w-full border border-slate-300 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Telegram @</label>
          <input name="telegram_handle" type="text" class="w-full border border-slate-300 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Instagram URL</label>
          <input name="instagram_url" type="url" class="w-full border border-slate-300 rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Instagram @</label>
          <input name="instagram_handle" type="text" class="w-full border border-slate-300 rounded px-3 py-2">
        </div>
      </div>
    </fieldset>
    <button type="submit" class="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded hover:bg-slate-800">Сохранить настройки</button>
  </form>
</div>
<script>
  document.body.dataset.pageMode = "settings";
  document.body.dataset.apiPath = "/api/settings";
</script>
{{end}}
