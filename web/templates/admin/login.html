{{define "admin/login.html"}}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Админ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-lg shadow-xl p-8">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">Comic Admin</h1>
    {{if .Error}}
    <div class="mb-4 p-3 bg-red-50 text-red-700 text-sm rounded border border-red-200">{{.Error}}</div>
    {{end}}
    <form method="post" action="/admin/login" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{.CSRF}}">
      <input type="hidden" name="next" value="{{.Next}}">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Логин</label>
        <input name="username" type="text" required autocomplete="username" class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-slate-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
        <input name="password" type="password" required autocomplete="current-password" class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-slate-500 outline-none">
      </div>
      <button type="submit" class="w-full bg-slate-900 text-white py-2 rounded font-medium hover:bg-slate-800">Войти</button>
    </form>
  </div>
</body>
</html>
{{end}}
