{{define "public/photos_content"}}
<div class="page-hero">
  <h1>ФОТО</h1>
</div>
<div class="page-body">
  {{if .Photos}}
  <div class="photo-gallery photo-gallery--grid" data-lightbox-gallery>
    {{range .Photos}}
    <button type="button" class="photo-thumb"
      data-lightbox-src="{{.ImageURL}}" data-lightbox-caption="{{.Title}}"
      aria-label="Открыть фото{{if .Title}}: {{.Title}}{{end}}">
      <img src="{{.ImageURL}}" alt="" class="photo-thumb-img" loading="lazy" decoding="async">
      <span class="photo-thumb-icon" aria-hidden="true">+</span>
    </button>
    {{end}}
  </div>
  {{else}}
  <p class="section-empty">Скоро появится.</p>
  {{end}}
</div>
{{end}}
