{{define "public/event_card"}}
<article class="event-card"
  data-event-title="{{attr .Title}}"
  data-event-city="{{attr .City}}"
  data-event-desc="{{attr .Description}}"
  data-event-date="{{formatEventDate .Date}}"
  data-event-poster="{{attr .PosterImageURL}}"
  data-event-ticket="{{attr .TicketURL}}">
  <div class="event-card-bg" aria-hidden="true"></div>
  <div class="event-card-body">
    <div class="event-date-row">
      <span class="event-day">{{formatEventDay .Date}}</span>
      <span class="event-meta">{{formatEventMeta .Date}}</span>
    </div>
    <h3 class="event-city">{{upper .City}}</h3>
    <p class="event-venue">{{.Title}}</p>
  </div>
  <div class="event-actions">
    <button type="button" class="event-btn event-btn--outline event-details-btn" aria-label="Подробнее о событии">ПОДРОБНЕЕ</button>
    {{if .TicketURL}}
    <a href="{{.TicketURL}}" target="_blank" rel="noopener" class="event-btn event-btn--gold event-buy-btn" aria-label="Купить билеты">КУПИТЬ →</a>
    {{else}}
    <span class="event-btn event-btn--outline event-buy-btn event-buy-btn--disabled">СКОРО</span>
    {{end}}
  </div>
</article>
{{end}}
