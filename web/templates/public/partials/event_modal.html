{{define "public/event_modal"}}
<div class="event-modal" id="event-modal" hidden>
  <div class="event-modal-backdrop" data-event-modal-close></div>
  <div class="event-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="event-modal-title">
    <div class="event-modal-handle" aria-hidden="true"></div>
    <button type="button" class="event-modal-close" data-event-modal-close aria-label="Закрыть">×</button>
    <div class="event-modal-poster-wrap hidden" id="event-modal-poster-wrap">
      <img class="event-modal-poster" id="event-modal-poster" alt="">
    </div>
    <p class="event-modal-date" id="event-modal-date"></p>
    <h2 class="event-modal-title" id="event-modal-title"></h2>
    <p class="event-modal-city" id="event-modal-city"></p>
    <div class="event-modal-desc" id="event-modal-desc"></div>
    <div class="event-modal-actions">
      <a href="#" class="btn-gold event-modal-buy" id="event-modal-buy" target="_blank" rel="noopener">КУПИТЬ БИЛЕТЫ →</a>
    </div>
  </div>
</div>
{{end}}
