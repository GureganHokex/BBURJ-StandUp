{{define "public/events_content"}}
<div class="page-hero">
  <h1>АФИША</h1>
</div>
<div class="page-body">
  {{if .Events}}
  <div class="events-row">
    {{range .Events}}
    {{template "public/event_card" .}}
    {{end}}
  </div>
  {{else}}
  <p class="section-empty">Скоро новые даты — следи за афишей.</p>
  {{end}}
</div>
{{end}}
