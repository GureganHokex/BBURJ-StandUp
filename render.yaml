# Render Blueprint — BBURJ-StandUp (Go + PostgreSQL)
# Repo: https://github.com/GureganHokex/BBURJ-StandUp
# Deploy: https://dashboard.render.com/blueprint/new?repo=https://github.com/GureganHokex/BBURJ-StandUp

databases:
  - name: bburj-db
    databaseName: comic
    user: comic
    plan: free
    region: frankfurt

services:
  - type: web
    name: bburj-standup
    runtime: docker
    plan: free
    region: frankfurt
    repo: https://github.com/GureganHokex/BBURJ-StandUp
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bburj-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SECURE_COOKIES
        value: "true"
      # Ephemeral on free tier — uploads reset on redeploy/spin-down
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: MIGRATIONS_DIR
        value: /app/migrations
      - key: TRUSTED_PROXIES
        value: "0.0.0.0/0"
