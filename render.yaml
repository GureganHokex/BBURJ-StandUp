# Render Blueprint — Comic Site (Go + PostgreSQL)
# Деплой: https://dashboard.render.com/blueprint/new?repo=<URL_ВАШЕГО_GITHUB_РЕПО>

databases:
  - name: comic-db
    databaseName: comic
    user: comic
    plan: free
    region: frankfurt

services:
  - type: web
    name: comic-site
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: comic-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECURE_COOKIES
        value: "true"
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: MIGRATIONS_DIR
        value: /app/migrations
      - key: TRUSTED_PROXIES
        value: "0.0.0.0/0"
