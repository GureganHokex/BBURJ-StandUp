# Yandex Cloud — один сервер (бюджет ~3 200–3 500 ₽/мес за VM + диск + IP).
# VM: 2 vCPU, 4 GB RAM, 40 GB network-ssd, Ubuntu 22.04, ru-central1-a.
#
# Usage:
#   cp .env.yc.example .env
#   # заполните .env
#   docker compose -f docker-compose.yc.yml --env-file .env up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-comic}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-comic}"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  app:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      APP_ENV: production
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SECURE_COOKIES: "true"
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "10"
      MIGRATIONS_DIR: /app/migrations
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.16.0.0/12}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
