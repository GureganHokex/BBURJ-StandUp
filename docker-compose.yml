services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: comic
      POSTGRES_PASSWORD: comic
      POSTGRES_DB: comic
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comic -d comic"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://comic:comic@db:5432/comic?sslmode=disable
      SESSION_SECRET: dev-only-change-me-32-chars-minimum-secret-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      SECURE_COOKIES: "false"
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "10"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
